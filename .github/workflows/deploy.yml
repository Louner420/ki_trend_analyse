name: Docker Build und Push

on:
  push:
    branches: [ "main" ] # Startet bei jedem Push auf den Main-Branch

permissions:
  contents: read
  packages: write # Ganz wichtig für GHCR!

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Louner
          password: secrets.GITHUB_TOKEN

      - name: Image bauen und hochladen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Kleinschreibung ist wichtig: ghcr.io/nutzer/projekt:tag
          tags: ghcr.io/louner420/ki_trend_analyse:latest
