{# Wiederverwendbares Post-Bearbeiten-Modal für Dashboard und Content Planner.
   Gleiche Struktur, gleiche CSS-Klassen, gleiche IDs für einheitliches Verhalten. #}
<div class="td-modal td-modal--post" id="postEditModal" aria-hidden="true">
  <div class="td-modal-backdrop" data-post-modal-close></div>
  <div class="td-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="postEditTitle">
    <div class="td-modal-header">
      <div>
        <h2 class="td-modal-title" id="postEditTitle">Post bearbeiten</h2>
        <p class="td-modal-sub">Änderungen werden sofort übernommen. To-Dos passen sich an.</p>
      </div>
      <button type="button" class="td-modal-close" data-post-modal-close aria-label="Schließen">✕</button>
    </div>
    <form id="postEditForm" class="td-modal-form">
      <div class="td-modal-content">
        <div class="td-modal-block">
          <label class="td-modal-label" for="postEditFieldTitle">Titel</label>
          <input type="text" id="postEditFieldTitle" name="title" class="td-modal-input" placeholder="Titel des Posts" />
        </div>
        <div class="td-modal-row">
          <div class="td-modal-block td-input-with-icon">
            <label class="td-modal-label" for="postEditFieldDate">Datum</label>
            <span class="td-input-icon td-input-icon--calendar" aria-hidden="true"></span>
            <input type="date" id="postEditFieldDate" name="date" class="td-modal-input" />
          </div>
          <div class="td-modal-block td-input-with-icon td-time-wrap">
            <label class="td-modal-label" for="postEditFieldTime">Uhrzeit</label>
            <span class="td-input-icon td-input-icon--clock" aria-hidden="true"></span>
            <input type="text" id="postEditFieldTime" name="time" class="td-modal-input td-time-input" placeholder="19:15" autocomplete="off" />
            <div class="td-time-picker" id="postEditTimePicker" aria-hidden="true"></div>
          </div>
        </div>
        <div class="td-modal-block">
          <label class="td-modal-label" for="postEditFieldStatus">Status</label>
          <select id="postEditFieldStatus" name="status" class="td-modal-select td-status-select">
            <option value="idea">Idee</option>
            <option value="filming">Filmen</option>
            <option value="editing">Editing</option>
            <option value="review">Review</option>
            <option value="ready">Ready</option>
          </select>
        </div>
        <div class="td-modal-block">
          <label class="td-modal-label" for="postEditFieldNotes">Notizen</label>
          <textarea id="postEditFieldNotes" name="notes" class="td-modal-textarea" rows="3" placeholder="Weitere Details …"></textarea>
        </div>
        <div class="td-modal-block td-checklist-block">
          <span class="td-modal-label">Checkliste</span>
          <div class="td-checklist">
            <label class="td-checklist-item">
              <input type="checkbox" id="postEditCheckFilmed" name="chk-filmed" class="td-checklist-input" />
              <span class="td-checklist-box"></span>
              <span class="td-checklist-label">Filmen erledigt</span>
            </label>
            <label class="td-checklist-item">
              <input type="checkbox" id="postEditCheckEdited" name="chk-edited" class="td-checklist-input" />
              <span class="td-checklist-box"></span>
              <span class="td-checklist-label">Schnitt erledigt</span>
            </label>
            <label class="td-checklist-item">
              <input type="checkbox" id="postEditCheckCaption" name="chk-caption" class="td-checklist-input" />
              <span class="td-checklist-box"></span>
              <span class="td-checklist-label">Caption fertig</span>
            </label>
            <label class="td-checklist-item">
              <input type="checkbox" id="postEditCheckSound" name="chk-sound" class="td-checklist-input" />
              <span class="td-checklist-box"></span>
              <span class="td-checklist-label">Sound gewählt</span>
            </label>
          </div>
        </div>
      </div>
    </form>
    <div class="td-modal-footer">
      <button type="button" class="td-button td-button--danger" id="postEditDelete">Löschen</button>
      <button type="button" class="td-button td-button--primary" id="postEditSave">Speichern</button>
    </div>
  </div>
</div>
