<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "TrendDash – Registrierung" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="auth-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="dash-card" style="width:100%;max-width:420px;margin:auto;">

        <div style="margin-bottom:18px;display:flex;flex-direction:column;gap:8px;">
            <div class="sidebar-logo">
                <div class="logo-mark">↗</div>
                <div class="logo-text">TrendDash</div>
            </div>

            <h1 class="dash-page-title" style="font-size:22px;">Registrieren</h1>

            <p class="dash-page-subtitle">
                Erstelle ein Konto, um TrendDash zu nutzen.
            </p>
        </div>

        <div id="registerError" style="margin-bottom:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(239,68,68,.7);background:rgba(239,68,68,.10);color:#fecaca;font-size:12px;display:{% if error %}block{% else %}none{% endif %}">
            {% if error %}{{ error }}{% endif %}
        </div>

        <form method="post" action="{{ url_for('main.register_post') }}" id="registerForm" style="display:flex;flex-direction:column;gap:14px;margin-top:4px;">

            <div class="form-group">
                <label for="email">E-Mail</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ email or '' }}"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                    class="{% if email_invalid %}input-error{% endif %}"
                >
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="btn-primary" style="width:100%;margin-top:6px;">
                Registrieren
            </button>
        </form>

        <p class="dash-page-subtitle" style="margin-top:14px;font-size:13px;text-align:center;">
            Bereits registriert?
            <a href="{{ url_for('main.login') }}">Zum Login</a>
        </p>

        <footer class="auth-footer" style="margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);text-align:center;font-size:12px;color:var(--muted, rgba(238,240,246,.55));">
            <a href="{{ url_for('main.impressum') }}">Impressum</a>
            <span style="margin:0 8px;opacity:.6;">·</span>
            <a href="{{ url_for('main.datenschutz') }}">Datenschutz</a>
        </footer>
    </div>
</div>

<script>
(function(){
  var form = document.getElementById('registerForm');
  var emailInput = document.getElementById('email');
  if (!form || !emailInput) return;
  function isValidEmail(s){
    if (!s || typeof s !== 'string') return false;
    var i = s.indexOf('@');
    if (i === -1) return false;
    var domain = s.slice(i + 1);
    return domain.indexOf('.') !== -1 && domain.length > 0;
  }
  form.addEventListener('submit', function(e){
    var val = (emailInput.value || '').trim();
    if (!isValidEmail(val)){
      e.preventDefault();
      emailInput.classList.add('input-error');
      var errEl = document.getElementById('registerError');
      if (errEl){ errEl.textContent = 'Bitte eine gültige E-Mail-Adresse eingeben (z.B. name@domain.com).'; errEl.style.display = 'block'; }
      return;
    }
    emailInput.classList.remove('input-error');
    var errEl = document.getElementById('registerError');
    if (errEl) errEl.style.display = 'none';
  });
  emailInput.addEventListener('input', function(){ this.classList.remove('input-error'); });
})();
</script>

</body>
</html>
